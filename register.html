<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="register-box">
            <div class="page-header">
                <h1>Register New User</h1>
                <a href="landing.html" class="btn-back">← Back to Dashboard</a>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="newUsername">Username</label>
                    <input type="text" id="newUsername" name="newUsername" required 
                           placeholder="Enter username" minlength="3">
                    <small class="form-hint">Minimum 3 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="newPassword">Password</label>
                    <input type="password" id="newPassword" name="newPassword" required 
                           placeholder="Enter password" minlength="6">
                    <small class="form-hint">Minimum 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                           placeholder="Confirm password">
                </div>
                
                <button type="submit" class="btn-register">Register User</button>
                <div id="message" class="message"></div>
            </form>
            
            <!-- User List Section -->
            <div class="user-list-section">
                <div class="section-header">
                    <h2>Registered Users</h2>
                    <button id="refreshUsersBtn" class="btn-secondary">Refresh List</button>
                </div>
                
                <div id="userListContainer" class="user-list-container">
                    <div id="loadingMessage" class="loading-message" style="display: none;">
                        Loading users...
                    </div>
                    <div id="userList" class="user-list">
                        <p class="info-text">Click "Refresh List" to view all registered users</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Replace this URL with your Google Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzO6wqGHUYUpKLbGnr7mcP1nHNR8YZVd3kjMtv2zPWWAFTgCDrJNFRpkUHXWwdJH6mg/exec';

        // Check if user is logged in
        window.addEventListener('DOMContentLoaded', function() {
            const loggedIn = sessionStorage.getItem('loggedIn');
            
            if (!loggedIn || loggedIn !== 'true') {
                // Redirect to login page if not logged in
                window.location.href = 'index.html';
                return;
            }
            
            // Auto-load users on page load
            loadUsers();
        });

        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newUsername = document.getElementById('newUsername').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                messageDiv.textContent = 'Passwords do not match!';
                messageDiv.className = 'message error';
                return;
            }
            
            // Validate password length
            if (newPassword.length < 6) {
                messageDiv.textContent = 'Password must be at least 6 characters long!';
                messageDiv.className = 'message error';
                return;
            }
            
            // Validate username length
            if (newUsername.length < 3) {
                messageDiv.textContent = 'Username must be at least 3 characters long!';
                messageDiv.className = 'message error';
                return;
            }
            
            // Show loading state
            messageDiv.textContent = 'Registering user...';
            messageDiv.className = 'message info';
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            
            try {
                // Send registration request to Google Apps Script
                const url = `${SCRIPT_URL}?action=addUser&username=${encodeURIComponent(newUsername)}&password=${encodeURIComponent(newPassword)}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const data = await response.json();
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register User';
                
                if (data.success) {
                    messageDiv.textContent = 'User registered successfully!';
                    messageDiv.className = 'message success';
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                    
                    // Reload user list
                    setTimeout(() => {
                        loadUsers();
                        messageDiv.style.display = 'none';
                    }, 2000);
                } else {
                    messageDiv.textContent = data.message || 'Registration failed. User may already exist.';
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register User';
                messageDiv.textContent = 'Error: ' + error.message;
                messageDiv.className = 'message error';
                console.error('Error:', error);
            }
        });

        // Load all users function
        async function loadUsers() {
            const userListContainer = document.getElementById('userListContainer');
            const loadingMessage = document.getElementById('loadingMessage');
            const userList = document.getElementById('userList');
            const refreshBtn = document.getElementById('refreshUsersBtn');
            
            // Show loading message
            loadingMessage.style.display = 'block';
            userList.innerHTML = '';
            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.textContent = 'Loading...';
            }
            
            try {
                // Fetch all users from Google Apps Script
                const url = `${SCRIPT_URL}?action=getAllUsers`;
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const data = await response.json();
                
                // Hide loading message
                loadingMessage.style.display = 'none';
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.textContent = 'Refresh List';
                }
                
                if (data.success && data.data && data.data.length > 0) {
                    // Display users in a table
                    let tableHTML = `
                        <table class="user-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Username</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    data.data.forEach((user, index) => {
                        tableHTML += `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${user.username}</td>
                            </tr>
                        `;
                    });
                    
                    tableHTML += `
                            </tbody>
                        </table>
                        <p class="user-count">Total Users: ${data.data.length}</p>
                    `;
                    
                    userList.innerHTML = tableHTML;
                } else {
                    userList.innerHTML = '<p class="no-users">No users found.</p>';
                }
                
            } catch (error) {
                loadingMessage.style.display = 'none';
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.textContent = 'Refresh List';
                }
                userList.innerHTML = `<p class="error-message">Error loading users: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }

        // Refresh users button
        document.getElementById('refreshUsersBtn').addEventListener('click', loadUsers);
    </script>
</body>
</html>
